<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Quiz Chủ nghĩa xã hội</title>

    <style>
      body {
        font-family: Arial;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .quiz-container {
        background: white;
        width: 750px;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      }

      .progress {
        font-weight: bold;
        margin-bottom: 10px;
      }

      .question {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 15px;
      }

      label {
        display: block;
        padding: 8px;
        margin: 5px 0;
        border-radius: 6px;
        cursor: pointer;
      }

      .correct {
        background: #c8f7c5;
      }
      .wrong {
        background: #ffc9c9;
      }

      button {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        margin-right: 10px;
      }

      #checkBtn {
        background: #007bff;
        color: white;
      }
      #nextBtn {
        background: #28a745;
        color: white;
      }
      #prevBtn {
        background: #6c757d;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="quiz-container">
      <div class="progress" id="progress"></div>
      <div id="questionBox" class="question"></div>
      <div id="optionsBox"></div>

      <button id="prevBtn" onclick="prevQuestion()">Câu trước</button>
      <button id="checkBtn" onclick="checkAnswer()">Kiểm tra</button>
      <button id="nextBtn" onclick="nextQuestion()">Câu tiếp theo</button>
    </div>

    <script>
      const questions = [
        {
          q: "Câu 18: Về phương diện chính trị - xã hội, giai cấp công nhân có đặc điểm gì?",
          options: [
            "A. Là sản phẩm xã hội của quá trình phát triển tư bản chủ nghĩa",
            "B. Là sản phẩm của quá trình phát triển kinh tế hàng hóa",
            "C. Là con đẻ của chủ nghĩa tư bản",
            "D. Là sản phẩm của quá trình phát triển xã hội phong kiến",
          ],
          answer: [0],
        },

        {
          q: "Câu 19:Theo quan điểm của chủ nghĩa Mác - Lênin “chủ nghĩa xã hội” được hiểu theo mấy nghĩa?",
          options: ["A. 4", "B. 3", "C. 2", "D. 1"],
          answer: [1],
        },

        {
          q: "Câu 20: Theo quan điểm của chủ nghĩa Mác – Lênin, có thể khái quát chủ nghĩa xã hội  trên mấy đặc trưng cơ bản?",
          options: ["A. 8", "B. 7", "C. 6", "D. 5"],
          answer: [2],
        },

        {
          q: "Câu 21: Theo quan điểm của chủ nghĩa Mác - Lênin, có mấy loại quá độ lên chủ nghĩa cộng sản?",
          options: ["A. 1", "B. 2", "C. 3", "D. 4"],
          answer: [1],
        },

        {
          q: "Câu 22: Xã hội xã hội chủ nghĩa mà nhân dân ta đang xây dựng có mấy đặc trưng?",
          options: ["A. 6", "B. 7", "C. 8", "D. 9"],
          answer: [2],
        },

        {
          q: "Câu 23: Điều kiện kinh tế cho sự ra đời của chủ nghĩa xã hội là gì?",
          options: [
            "A. Điện khí hóa",
            "B. Tự động hóa",
            "C. Tin học hóa",
            "D. Phát triển lực lượng sản xuất",
          ],
          answer: [3],
        },

        {
          q: "Câu 24: Theo quan điểm của V.I. Lênin, để thiết lập một chế độ cao hơn chủ nghĩa tư bản, giai cấp công nhân cần phải phải tổ chức lao động theo một trình độ cao hơn và?",
          options: [
            "A. Nâng cao năng suất lao động",
            "B. Phát triển lực lượng sản xuất",
            "C. Đẩy mạnh sản xuất",
            "D. Công nghiệp hóa",
          ],
          answer: [0],
        },

        {
          q: "Câu 25: Cơ sở kinh tế của chủ nghĩa xã hội khác về bản chất so với chủ nghĩa tư bản ở điểm nào?",
          options: [
            "A. Chế độ sở hữu TLSX chủ yếu",
            "B. Tư hữu TLSX",
            "C. Công hữu TLSX",
            "D. Tổ chức quản lý",
          ],
          answer: [2],
        },

        {
          q: "Câu 26: Tại sao Việt Nam lựa chọn con đường cách mạng phát triển là đi lên chủ nghĩa xã hội bỏ qua chế độ tư bản chủ nghĩa?",
          options: [
            "A. Nông nghiệp lạc hậu",
            "B. Tư sản yếu",
            "C. Thuộc địa nửa phong kiến",
            "D. Phù hợp nguyện vọng dân tộc và xu thế thời đại",
          ],
          answer: [3],
        },

        {
          q: "Câu 88: Thực chất của thời kỳ quá độ lên chủ nghĩa xã hội là gì?",
          options: [
            "A. Cải biến cách mạng",
            "B. Kinh tế nhiều thành phần",
            "C. Nhiều hình thức phân phối",
            "D. Nhiều hình thức sở hữu",
          ],
          answer: [0],
        },

        {
          q: "Câu 89: Quá độ lên chủ nghĩa xã hội ở Việt Nam là loại quá độ nào?",
          options: [
            "A. Trực tiếp",
            "B. Gián tiếp bỏ qua TBCN",
            "C. Bỏ qua phong kiến",
            "D. Có trung gian",
          ],
          answer: [1],
        },

        {
          q: "Câu 90: Thời kỳ quá độ lên chủ nghĩa xã hội ở trên phạm vi cả nước ta bắt đầu từ khi nào?",
          options: ["A. 1945", "B. 1954", "C. 1975", "D. 1930"],
          answer: [2],
        },

        {
          q: "Câu 91: Cương lĩnh xây dựng đất nước trong thời kỳ quá độ lên chủ nghĩa xã hội được Đảng ta nêu ra ở Đại hội nào?",
          options: ["A. IV", "B. VI", "C. VII", "D. VIII"],
          answer: [2],
        },

        {
          q: "Câu 92: Trong Văn kiện Đại hội IX, Đảng ta xác định phải tiếp thu và kế thừa những gì của chủ nghĩa tư bản trong thời kỳ quá độ lên chủ nghĩa xã hội ở Việt Nam?",
          options: [
            "A. Thành tựu KH-CN",
            "B. Mô hình quản lý",
            "C. Giá trị kinh tế-chính trị-văn hóa",
            "D. Cách thức tổ chức quản lý",
          ],
          answer: [0],
        },

        {
          q: "Câu 93: Chỉ ra luận điểm chính xác nhất về xã hội xã hội chủ nghĩa?",
          options: [
            "A. Xóa bỏ tư hữu phong kiến",
            "B. Xóa bỏ sản xuất hàng hóa",
            "C. Xóa bỏ tự cấp tự túc",
            "D. Xóa bỏ tư hữu tư nhân",
          ],
          answer: [3],
        },

        {
          q: "Câu 94: Đặc điểm của thời kỳ quá độ lên chủ nghĩa xã hội về mặt tư tưởng - văn hóa là?",
          options: [
            "A. Vô sản & tư sản",
            "B. Thuần khiết",
            "C. Văn hóa đan xen",
            "D. Phong kiến & vô sản",
          ],
          answer: [0],
        },

        {
          q: "Câu 95: Đặc điểm của thời kỳ quá độ lên chủ nghĩa xã hội trên lĩnh vực kinh tế là gì?",
          options: [
            "A. Nhiều hệ tư tưởng",
            "B. Kinh tế nhiều thành phần",
            "C. Đấu tranh giai cấp",
            "D. Tàn dư chế độ cũ",
          ],
          answer: [1],
        },

        {
          q: "Câu 96: Đặc điểm của thời kỳ quá độ lên chủ nghĩa xã hội trên lĩnh vực xã hội là gì?",
          options: [
            "A. Nhiều sở hữu",
            "B. Nhiều thành phần kinh tế",
            "C. Giai cấp & đấu tranh giai cấp",
            "D. Tàn dư tư tưởng",
          ],
          answer: [2],
        },

        {
          q: "Câu 97: Chủ nghĩa xã hội dựa trên chế độ sở hữu nào về tư liệu sản xuất chủ yếu?",
          options: ["A. Tư hữu", "B. Tập thể", "C. Hỗn hợp", "D. Công hữu"],
          answer: [3],
        },

        {
          q: "Câu 98: Theo quan điểm của C. Mác, giữa xã hội tư bản chủ nghĩa và xã hội cộng sản chủ nghĩa là một thời kỳ cải biến cách mạng từ xã hội nọ sang xã hội kia. Thích ứng với thời kỳ ấy là?",
          options: [
            "A. Kinh tế",
            "B. Thị trường",
            "C. Quá độ chính trị",
            "D. Văn hóa",
          ],
          answer: [2],
        },

        {
          q: "Câu 99:Chọn phương án đúng nhất về sự phát triển quá độ lên chủ nghĩa xã hội bỏ qua chế độ tư bản chủ nghĩa ở nước ta là bỏ qua yếu tố nào?",
          options: [
            "A. Nhà nước TBCN",
            "B. Cơ sở kinh tế TBCN",
            "C. Quan hệ sản xuất TBCN",
            "D. Áp bức bóc lột",
          ],
          answer: [2],
        },
      ];

      let currentQuestion = 0;
      let userAnswers = new Array(questions.length).fill([]);
      let checkedQuestions = new Array(questions.length).fill(false);

      function loadQuestion() {
        let q = questions[currentQuestion];
        document.getElementById("progress").innerText =
          `Câu ${currentQuestion + 1} / ${questions.length}`;

        document.getElementById("questionBox").innerText = q.q;

        let html = "";

        q.options.forEach((option, index) => {
          let checked = "";
          if (userAnswers[currentQuestion].includes(index)) {
            checked = "checked";
          }

          html += `
<label>
<input type="checkbox" value="${index}" ${checked}>
${option}
</label>
`;
        });

        document.getElementById("optionsBox").innerHTML = html;

        document.getElementById("prevBtn").style.display =
          currentQuestion === 0 ? "none" : "inline-block";

        restoreColors();
      }

      function checkAnswer() {
        let selected = [];
        document.querySelectorAll("#optionsBox input").forEach((cb) => {
          if (cb.checked) selected.push(parseInt(cb.value));
        });

        if (selected.length === 0) {
          alert("Bạn chưa chọn đáp án!");
          return;
        }

        userAnswers[currentQuestion] = selected;
        checkedQuestions[currentQuestion] = true;
        showCorrectWrong();
      }

      function showCorrectWrong() {
        let correct = questions[currentQuestion].answer;
        let labels = document.querySelectorAll("#optionsBox label");

        labels.forEach((label, index) => {
          label.classList.remove("correct", "wrong");

          if (correct.includes(index)) label.classList.add("correct");

          if (
            userAnswers[currentQuestion].includes(index) &&
            !correct.includes(index)
          )
            label.classList.add("wrong");
        });
      }

      function restoreColors() {
        if (checkedQuestions[currentQuestion]) showCorrectWrong();
      }

      function nextQuestion() {
        if (currentQuestion < questions.length - 1) {
          currentQuestion++;
          loadQuestion();
        } else {
          showResult();
        }
      }

      function prevQuestion() {
        currentQuestion--;
        loadQuestion();
      }

      function showResult() {
        let score = 0;

        questions.forEach((q, index) => {
          let user = userAnswers[index] || [];
          let correct = q.answer;

          if (
            user.length === correct.length &&
            user.every((val) => correct.includes(val))
          ) {
            score++;
          }
        });

        document.querySelector(".quiz-container").innerHTML =
          `<h2>Hoàn thành!</h2>
<p>Bạn đúng ${score} / ${questions.length} câu</p>`;
      }

      loadQuestion();
    </script>
  </body>
</html>
